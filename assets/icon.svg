<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    
    <!-- Orbital Gradients -->
    <linearGradient id="orbGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec" />
      <stop offset="100%" stop-color="#89b4fa" />
    </linearGradient>
    <linearGradient id="orbGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7" />
      <stop offset="100%" stop-color="#f5c2e7" />
    </linearGradient>
    <linearGradient id="orbGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5" />
      <stop offset="100%" stop-color="#a6e3a1" />
    </linearGradient>
    
    <!-- Core Force Gradient -->
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9e2af" />
      <stop offset="100%" stop-color="#fab387" />
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Rounded Rectangle -->
  <rect x="12" y="12" width="232" height="232" rx="52" fill="url(#bgGrad)" />
  <!-- Inner Border for slight depth effect -->
  <rect x="12" y="12" width="232" height="232" rx="52" stroke="#313244" stroke-width="2" />

  <!-- Code Brackets (IDE connection) -->
  <path d="M64 96L32 128L64 160" stroke="#7f849c" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <path d="M192 96L224 128L192 160" stroke="#7f849c" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Atom and Orbitals Group (DFT connection) -->
  <g filter="url(#glow)">
    <!-- Orbital Paths -->
    <!-- Orbital 1 (Blue) -->
    <ellipse cx="128" cy="128" rx="26" ry="84" transform="rotate(30 128 128)" stroke="url(#orbGrad1)" stroke-width="6" fill="none" opacity="0.95"/>
    <!-- Orbital 2 (Magenta) -->
    <ellipse cx="128" cy="128" rx="26" ry="84" transform="rotate(-30 128 128)" stroke="url(#orbGrad2)" stroke-width="6" fill="none" opacity="0.95"/>
    <!-- Orbital 3 (Green) -->
    <ellipse cx="128" cy="128" rx="26" ry="84" transform="rotate(90 128 128)" stroke="url(#orbGrad3)" stroke-width="6" fill="none" opacity="0.95"/>

    <!-- Electrons moving on paths -->
    <circle cx="128" cy="44" r="5" fill="#ffffff" transform="rotate(30 128 128)"/>
    <circle cx="128" cy="212" r="5" fill="#ffffff" transform="rotate(-30 128 128)"/>
    <circle cx="128" cy="44" r="5" fill="#ffffff" transform="rotate(90 128 128)"/>

    <!-- Core Nucleus -->
    <circle cx="128" cy="128" r="14" fill="url(#coreGrad)"/>
    <circle cx="128" cy="128" r="6" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
