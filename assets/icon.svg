<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
    
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    
    <!-- Primary Brand Gradient (matches your React UI Webview design) -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1677FF" />
      <stop offset="100%" stop-color="#722ED1" />
    </linearGradient>

    <!-- Inverse Brand Gradient -->
    <linearGradient id="inverseBrandGrad" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1677FF" />
      <stop offset="100%" stop-color="#722ED1" />
    </linearGradient>

    <!-- Blur/Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="2"/>
  
  <!-- Subtle inner grid effect (technological feel) -->
  <path d="M26 64 h76 M64 26 v76" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Core Logo Design -->
  <g filter="url(#glow)">
    <!-- Tech node hexagon representing the 'Design' & 'Verification' Flows -->
    <path d="M64 36 L88 50 L88 78 L64 92 L40 78 L40 50 Z" fill="none" stroke="url(#brandGrad)" stroke-width="6" stroke-linejoin="round"/>
    
    <!-- Circuit internal connections -->
    <path d="M64 54 L64 36 M50 63 L40 50 M78 63 L88 50" stroke="url(#inverseBrandGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Central intelligence/Processing core -->
    <circle cx="64" cy="64" r="10" fill="url(#brandGrad)" />
    
    <!-- Outer orbiting elements representing orchestration -->
    <circle cx="64" cy="64" r="38" fill="none" stroke="url(#brandGrad)" stroke-width="2" stroke-dasharray="8, 12" opacity="0.6" />
    
    <!-- Highlight Dots -->
    <circle cx="64" cy="26" r="4" fill="#1677FF" />
    <circle cx="97" cy="45" r="4" fill="#534ED6" />
    <circle cx="97" cy="83" r="4" fill="#722ED1" />
    <circle cx="64" cy="102" r="4" fill="#722ED1" />
    <circle cx="31" cy="83" r="4" fill="#534ED6" />
    <circle cx="31" cy="45" r="4" fill="#1677FF" />
  </g>
</svg>
