<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer chip body with rounded corners -->
  <rect x="18" y="18" width="64" height="64" rx="8" ry="8"
        fill="none" stroke="currentColor" stroke-width="5"/>

  <!-- Top pins (3 pins) -->
  <line x1="34" y1="18" x2="34" y2="6"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="18" x2="50" y2="6"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="66" y1="18" x2="66" y2="6"  stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Bottom pins (3 pins) -->
  <line x1="34" y1="82" x2="34" y2="94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="50" y1="82" x2="50" y2="94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="66" y1="82" x2="66" y2="94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Left pins (3 pins) -->
  <line x1="18" y1="34" x2="6"  y2="34" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="18" y1="50" x2="6"  y2="50" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="18" y1="66" x2="6"  y2="66" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Right pins (3 pins) -->
  <line x1="82" y1="34" x2="94" y2="34" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="82" y1="50" x2="94" y2="50" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="82" y1="66" x2="94" y2="66" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Inner circuit board pattern -->
  <!-- Center diamond/cross pattern -->
  <rect x="36" y="36" width="28" height="28" rx="4" ry="4"
        fill="currentColor" opacity="0.15"/>

  <!-- DFT "D" letter formed via circuit paths -->
  <!-- Horizontal bar top -->
  <line x1="38" y1="40" x2="56" y2="40" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Vertical bar left -->
  <line x1="38" y1="40" x2="38" y2="60" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Horizontal bar bottom -->
  <line x1="38" y1="60" x2="56" y2="60" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arc right side (approximated with polyline) -->
  <polyline points="56,40 62,44 62,56 56,60"
            fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
