# DFT IDE Pipeline Configuration for VERIFICATION
# Modify this file to customize the steps and commands of the pipeline.

- id: prepare_workspace
  name: prepare_workspace
  command: "lander prepare_workspace --dir ./verify_run"
  description: 准备 verification workspace

- id: load_config
  name: load_config
  command: "lander load_config --file lander_verify.cfg"
  description: 加载 lander 配置

- id: check_env
  name: check_env
  command: "run_flow_lander check_env --tools"
  description: 检查仿真环境、filelist 和工具版本

- id: submit_mode
  name: submit_mode
  command: "lander submit_mode --mode scan_test"
  description: 提交仿真 mode 任务

- id: collect_result
  name: collect_result
  command: "lander collect_result --dir ./verify_run"
  description: 收集仿真结果

- id: parse_report
  name: parse_report
  command: "lander parse_report --out report.json"
  description: 解析 pass / fail / error 报告

- id: publish_dashboard
  name: publish_dashboard
  command: "lander publish_dashboard --server ide-board"
  description: 发布结果到 IDE 看板

